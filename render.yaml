# Render Blueprint: one Web Service running Django + Celery worker + Celery beat (see backend/docker-entrypoint.sh + Procfile)
# Link your own Redis (Render Redis or external) — set REDIS_URL in the dashboard.

services:
  - type: web
    name: ece-capstone-backend
    runtime: docker 
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /admin/login/
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        sync: false
      # Paste secrets only in Render → Environment (never commit values). Django reads 
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: FIELD_ENCRYPTION_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
