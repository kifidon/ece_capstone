<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SmartHub Setup</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, sans-serif; background: #f5f5f5; display: flex;
               justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: white; border-radius: 12px; padding: 32px; max-width: 400px;
                width: 100%; box-shadow: 0 2px 12px rgba(0,0,0,0.1); text-align: center; }
        h1 { font-size: 22px; margin-bottom: 12px; color: #d9534f; }
        p { color: #555; font-size: 15px; line-height: 1.5; }
        a { display: inline-block; margin-top: 20px; padding: 12px 24px; background: #4A90D9;
            color: white; text-decoration: none; border-radius: 8px; font-weight: 600; }
        a:active { background: #3a7bc8; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Connection Failed</h1>
        <p>Could not connect to <strong>{{ ssid }}</strong>.</p>
        <p style="margin-top:8px">Please check that the network name and password are correct and try again.</p>
        <a href="/">Try Again</a>
    </div>
</body>
</html>
