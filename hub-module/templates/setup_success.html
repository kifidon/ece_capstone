<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SmartHub Setup</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, sans-serif; background: #f5f5f5; display: flex;
               justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: white; border-radius: 12px; padding: 32px; max-width: 400px;
                width: 100%; box-shadow: 0 2px 12px rgba(0,0,0,0.1); text-align: center; }
        h1 { font-size: 22px; margin-bottom: 12px; }
        p { color: #555; font-size: 15px; line-height: 1.5; }
        .serial { color: #888; font-size: 13px; margin-top: 12px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Connecting...</h1>
        <p>Your SmartHub is connecting to <strong>{{ ssid }}</strong>.</p>
        <p style="margin-top:12px">You can disconnect from this hotspot now.
        Go to the SmartHub website to finish setup by entering your hub serial number.</p>
        <p class="serial">Serial: {{ serial }}</p>
    </div>
</body>
</html>
